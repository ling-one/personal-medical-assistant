version: '3.8'

services:
  # RAGFlow 服务
  ragflow:
    image: infgrad/ragflow:v0.12.0
    container_name: ragflow
    restart: always
    ports:
      - "9380:9380"
    volumes:
      - ./data/ragflow:/ragflow/data
      - ./data/pdfs:/ragflow/pdfs
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MINIO_ADDRESS=minio:9000
      - REDIS_ADDRESS=redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      - elasticsearch
      - minio
      - redis

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ragflow-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  minio:
    image: minio/minio:latest
    container_name: ragflow-minio
    restart: always
    environment:
      - MINIO_ROOT_USER=ragflow
      - MINIO_ROOT_PASSWORD=ragflow123456
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  redis:
    image: redis:7.2
    container_name: ragflow-redis
    restart: always
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  # API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-qa-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAGFLOW_BASE_URL=http://ragflow:9380
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    depends_on:
      - ragflow

  # 调试界面
  debug:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: medical-qa-debug
    restart: always
    ports:
      - "8001:8001"
    environment:
      - TRACE_PORT=8001
    depends_on:
      - api
